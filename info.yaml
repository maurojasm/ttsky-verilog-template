# Tiny Tapeout project information
project:
  title:        "8-bit ALU"      # Project title
  author:       "Mauricio Rojas Morales"      # Your name
  discord:      ""      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "Implements a 8-bit with 8 operation codes."      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     0       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_marojasm_alu"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "tt_um_marojasm_alu.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "0 bit of input A"
  ui[1]: "1 bit of input A"
  ui[2]: "2 bit of input A"
  ui[3]: "3 bit of input A"
  ui[4]: "4 bit of input A"
  ui[5]: "5 bit of input A"
  ui[6]: "6 bit of input A"
  ui[7]: "7 bit of input A"

  # Outputs
  uo[0]: "0 bit of result value"
  uo[1]: "1 bit of result value"
  uo[2]: "2 bit of result value"
  uo[3]: "3 bit of result value"
  uo[4]: "4 bit of result value"
  uo[5]: "5 bit of result value"
  uo[6]: "6 bit of result value"
  uo[7]: "7 bit of result value"

  # Bidirectional pins
  uio[0]: "0 bit of opcode"
  uio[1]: "1 bit of opcode"
  uio[2]: "2 bit of opcode"
  uio[3]: "0 bit of input B"
  uio[4]: "1 bit of input B"
  uio[5]: "2 bit of input B"
  uio[6]: "3 bit of input B"
  uio[7]: "4 bit of input B - out: 1 bit carry out"

# Do not change!
yaml_version: 6
